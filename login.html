<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>


<section class="hero">


<div class="container">


<div class="feature-card">


<h2>
Login To TrustCards
</h2>



<form id="loginForm">

required>

<button

class="btn-primary">

Login

</button>


</form>



<p>

Don't have an account?

<a href="register.html">

</a>

</p>



</div>


</div>


</section>
