<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | TrustCards</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="hero">


<div class="container">


<div class="feature-card">


<h2>Create TrustCards Account</h2>


<form id="registerForm">


<input 
type="text" 
id="name"
placeholder="Full Name"
required>


<br><br>


<input 
type="email"
id="email"
placeholder="Email Address"
required>


<br><br>


<input 
type="password"
id="password"
placeholder="Password"
required>


<br><br>


<button 
type="submit"
class="btn-primary">

Create Account

</button>


</form>


<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>


</div>


</div>


</section>



<script type="module" src="./app.js"></script>


</body>

</html>
