<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exchange Gift Card | TrustCards</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="hero">


<div class="container">


<div class="feature-card">


<h2>Exchange Your Gift Card 🎁</h2>


<p>
Submit your gift card details and we will process your exchange.
</p>



<form id="exchangeForm">


<label>
Select Gift Card
</label>

<br>

<select id="giftCard" required>

<option value="">
Choose Card
</option>

<option value="Apple">
Apple Gift Card
</option>

<option value="Amazon">
Amazon Gift Card
</option>

<option value="Steam">
Steam Gift Card
</option>

<option value="Google Play">
Google Play Gift Card
</option>

<option value="Razer Gold">
Razer Gold
</option>

<option value="Visa">
Visa Gift Card
</option>

</select>


<br><br>


<label>
Card Amount
</label>

<br>

<input
type="number"
id="amount"
placeholder="Enter amount"
required>


<br><br>


<label>
Gift Card Code
</label>

<br>

<input
type="text"
id="cardCode"
placeholder="Enter gift card code"
required>


<br><br>


<button
type="submit"
class="btn-primary">

Submit Exchange

</button>


</form>


<br>


<a href="dashboard.html">
Back to Dashboard
</a>


</div>


</div>


</section>



<script type="module" src="./exchange.js"></script>


</body>

</html>
