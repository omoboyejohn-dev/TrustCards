<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exchange Gift Card | TrustCards</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="hero">


<div class="container">


<div class="feature-card">


<h2>Exchange Your Gift Card 🎁</h2>


<p>
Submit your gift card details and we will process your exchange.
</p>


<form id="exchangeForm">


<label>
Select Country
</label>

<br>

<select id="country" required>

<option value="">
Choose Country
</option>

<option>🇺🇸 USA</option>
<option>🇬🇧 UK</option>
<option>🇨🇦 Canada</option>
<option>🇵🇱 Poland</option>
<option>🇩🇪 Germany</option>
<option>🇧🇷 Brazil</option>
<option>🇲🇽 Mexico</option>
<option>🇦🇺 Australia</option>
<option>🇪🇸 Spain</option>
<option>🇫🇷 France</option>
<option>🇵🇹 Portugal</option>
<option>🇮🇹 Italy</option>
<option>🇬🇷 Greece</option>
<option>🇸🇦 Saudi Arabia</option>

</select>


<br><br>


<label>
Select Gift Card
</label>

<br>

<select id="giftCard" required>

<option value="">
Choose Card
</option>

<option>Apple Gift Card</option>
<option>Amazon Gift Card</option>
<option>Steam Gift Card</option>
<option>Google Play Gift Card</option>
<option>Razer Gold Gift Card</option>
<option>Visa Gift Card</option>
<option>Mastercard Gift Card</option>
<option>American Express Gift Card</option>
<option>Sephora Gift Card</option>
<option>Nike Gift Card</option>
<option>eBay Gift Card</option>
<option>Walmart Gift Card</option>
<option>Target Gift Card</option>
<option>Xbox Gift Card</option>
<option>PlayStation Gift Card</option>
<option>iTunes Gift Card</option>
<option>Vanilla Gift Card</option>
<option>Nordstrom Gift Card</option>
<option>Macy’s Gift Card</option>
<option>Roblox Gift Card</option>
<option>Best Buy Gift Card</option>
<option>Airbnb Gift Card</option>
<option>Spotify Gift Card</option>
<option>Uber Gift Card</option>

</select>


<br><br>


<label>
Currency
</label>

<br>

<select id="currency" required>

<option value="">
Choose Currency
</option>

<option value="USD">
🇺🇸 USD ($)
</option>

<option value="NGN">
🇳🇬 Naira (₦)
</option>

</select>


<br><br>


<label>
Card Amount
</label>

<br>

<input
type="number"
id="amount"
placeholder="Enter amount"
required>


<br><br>


<label>
Upload Front Image
</label>

<br>

<input
type="file"
id="frontImage"
accept="image/*"
required>


<br><br>


<label>
Upload Back Image
</label>

<br>

<input
type="file"
id="backImage"
accept="image/*"
required>


<br><br>


<label>
Gift Card Code
</label>

<br>

<input
type="text"
id="cardCode"
placeholder="Enter gift card code"
required>


<br><br>


<button
type="submit"
class="btn-primary">

Submit Exchange

</button>


</form>


<br>


<a href="dashboard.html">
Back to Dashboard
</a>


</div>


</div>


</section>



<script type="module" src="./exchange.js"></script>


</body>

</html>
